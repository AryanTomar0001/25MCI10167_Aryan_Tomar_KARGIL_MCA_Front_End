<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Huffman Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Huffman Encoding Visualizer</h1>
<p style="text-align:center; opacity:0.7;">
  Visualize compression like a pro 
</p>

      <textarea id="inputText" placeholder="Enter text..."></textarea>
      <button onclick="encode()">Encode</button>

      <h3>Codes</h3>
      <table id="codesTable">
        <tr>
          <th>Char</th>
          <th>Freq</th>
          <th>Code</th>
        </tr>
      </table>

      <h3>🌳 Huffman Tree</h3>
      <div id="tree"></div>

      <h3>⚙️ Steps</h3>
      <ul id="steps"></ul>

      <h3>🔐 Encoded</h3>
      <p id="encoded"></p>

      <h3>🔓 Decoded</h3>
      <p id="decoded"></p>

      <h3 id="ratio"></h3>
    </div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
