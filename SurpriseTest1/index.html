<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart To-Do Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">Smart To-Do Manager</h2>


  <div class="row g-2">
    <div class="col-md-4">
      <input id="taskInput" class="form-control" placeholder="Enter Task">
    </div>

    <div class="col-md-3">
      <select id="priority" class="form-select">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </div>

    <div class="col-md-3">
      <input type="date" id="deadline" class="form-control">
    </div>

    <div class="col-md-2">
      <button class="btn btn-primary w-100" onclick="addTask()">Add</button>
    </div>
  </div>

  <div class="mt-4 d-flex justify-content-between flex-wrap gap-2">
    <div>
      <button class="btn btn-outline-primary" onclick="filterTasks('all')">All</button>
      <button class="btn btn-outline-success" onclick="filterTasks('completed')">Completed</button>
      <button class="btn btn-outline-warning" onclick="filterTasks('pending')">Pending</button>
    </div>

    <div>
      <select class="form-select" onchange="sortTasks(this.value)">
        <option value="">Sort</option>
        <option value="priority">Priority (High → Low)</option>
        <option value="deadline">Deadline (Nearest)</option>
      </select>
    </div>
  </div>


  <div class="mt-3">
    <span>Total: <b id="total"></b></span> |
    <span>Completed: <b id="completed"></b></span> |
    <span>Pending: <b id="pending"></b></span>
  </div>


  <div id="taskList" class="mt-4"></div>

</div>

<script src="script.js"></script>
</body>
</html>
